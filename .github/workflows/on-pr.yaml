name: on-pr

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - ".github/workflows/on-pr.yaml"
      - "apis/**"
      - "examples/**"
      - "tests/**"
      - "functions/**"
      - "upbound.yaml"

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/validate.yaml@v3.0.0
    with:
      examples: |
        [
          { "example": "examples/openpanelproviderstacks/minimal.yaml" },
          { "example": "examples/openpanelproviderstacks/full.yaml" }
        ]
      api_path: apis/openpanelproviderstacks
      error_on_missing_schemas: true

  test:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/test.yaml@v3.0.0

  publish:
    needs:
      - validate
      - test
    uses: unbounded-tech/workflows-crossplane/.github/workflows/publish.yaml@v3.0.0
    secrets: inherit
    with:
      tag: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
