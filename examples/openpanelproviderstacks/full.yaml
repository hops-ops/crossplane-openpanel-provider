apiVersion: crossplane.ops.com.ai/v1alpha1
kind: OpenPanelProviderStack
metadata:
  name: openpanel
  namespace: default
spec:
  clusterName: my-cluster
  kubernetesProviderConfigRef:
    name: my-cluster
  providerConfigName: openpanel
  providerConfigNamespace: default
  secretName: openpanel-provider-creds
  secretNamespace: crossplane-system
  runtimeConfig:
    requestsCpu: 100m
    requestsMemory: 256Mi
  nodePool:
    enabled: true
